# 威科夫吸筹-弹簧效应策略 v2 (网格搜索最优参数)
# 核心买点: Spring弹簧效应(跌破支撑后收回) + 低位确认 + SC/ST确认
# 加仓: SOS强势信号(宽价差) + LPS缩量回踩(更高低点)
# 卖出: UTAD上冲回落 + BC抢购高潮
# 网格搜索最优: stop=3%, trail=5%, hold≤15d, 盈亏比2.18
name: "威科夫吸筹-弹簧效应"
k_type: daily
backtest_mode: signal
buy_price_type: open
sell_price_type: avg
buy_execution: next_day
sell_execution: next_day

buy_groups:
  # 组1: SC抛售高潮 + Spring Type3(最安全,<1%破位+缩量,75-85%成功率)
  - conditions:
      - indicator: selling_climax
        params: {vol_ratio: 2.0, min_drop: -4.0, wick_ratio: 0.3}
      - indicator: spring_shakeout
        params: {support_period: 20, support_type: low, vol_confirm: true, spring_type: 3}

  # 组2: ST二次测试(确认支撑) + Spring
  - conditions:
      - indicator: secondary_test
        params: {test_type: support, period: 20, vol_shrink: 0.5}
      - indicator: spring_shakeout
        params: {support_period: 20, support_type: low, vol_confirm: false}

  # 组3: No Supply(供应枯竭) + 低位
  - conditions:
      - indicator: no_supply
        params: {vol_shrink: 0.4, max_drop: -0.5}
      - indicator: low_position
        params: {price_pct: 40, ma60_dist: 8}

add_groups:
  # SOS强势信号(宽价差阳线)确认后加仓
  - conditions:
      - indicator: sign_of_strength
        params: {breakout_period: 20, vol_ratio: 1.5, min_pct: 2.0, wide_spread: true}

  # LPS缩量回踩(更高低点)加仓
  - conditions:
      - indicator: last_point_support
        params: {pullback_to: ma20, vol_shrink: 0.6, tolerance: 3, higher_low: true}

sell_groups:
  # UTAD上冲回落(假突破=派发信号)
  - conditions:
      - indicator: upthrust_distribution
        params: {resist_period: 20, high_position: 70, vol_confirm: true}

  # BC抢购高潮(天量+长上影)
  - conditions:
      - indicator: buying_climax
        params: {vol_ratio: 2.0, min_rise: 5.0, wick_ratio: 0.4, high_position: 75}

reduce_groups:
  # SOW弱势信号减仓
  - conditions:
      - indicator: sign_of_weakness
        params: {support_period: 20, vol_ratio: 1.3, min_drop: -2.0}

  # No Demand(上涨乏力)减仓
  - conditions:
      - indicator: no_demand
        params: {vol_shrink: 0.5, min_rise: 0.0, max_rise: 2.0}

reduce_pct: 0.5
stop_loss_pct: 3.0
take_profit_pct: 15.0
trailing_stop_pct: 5.0
max_hold_days: 15

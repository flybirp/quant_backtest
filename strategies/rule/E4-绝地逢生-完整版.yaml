# 策略：绝地逢生-完整版
# 来源：discover_绝地逢生.md - 完整基本面指标
#
# 核心逻辑（完整版）：
# 1. 深跌（前20天跌>15%）- 恐慌出清
# 2. 放量（量比>1.2）- 有资金在恐慌中接货
# 3. 非派发阶段 - 卖压衰竭
# 4. PE < 25 - 估值不贵（最强保护）
# 5. PB < 2 - 破净保护
# 6. 市值 > 200亿 - 大盘股稳定
#
# 统计依据：
# - PE<25 + 量比>1.2：向上突破概率6.5倍
# - PB<1：向下突破概率仅3.2%
# - 市值>500亿：向下突破概率仅3.4%

name: E4-绝地逢生-完整版
_pool: 大蓝筹
backtest_mode: signal
buy_execution: next_day
buy_price_type: open
sell_execution: next_day
sell_price_type: avg
k_type: daily

# 入场条件：绝地逢生完整版 - 深跌+放量+低估值
buy_groups:
  - name: 绝地逢生完整版
    conditions:
      # 深跌（前20天跌>15%）- 恐慌出清
      - indicator: pct_change_lt
        params: {pct: -15, lookback: 20}
      # 放量（量比>1.2）- 有资金在恐慌中接货
      - indicator: volume_anomaly
        params: {ratio: 1.2}
      # 非派发阶段 - 卖压衰竭
      - indicator: not_distribution
      # PE < 25 - 估值不贵（最强保护）
      - indicator: pe_ttm_below
        params: {threshold: 25}
      # PB < 2 - 破净保护
      - indicator: pb_below
        params: {threshold: 2.0}
      # 市值 > 200亿 - 大盘股稳定
      - indicator: total_mv_above
        params: {threshold: 200}

# 出场条件
sell_groups:
  - name: 趋势反转
    conditions:
      # 知行死叉离场
      - indicator: zhixing_dead_cross

# 风控参数（稳健版，止损≤15%）
stop_loss_pct: 12        # 止损12%（散户心理承受内）
take_profit_pct: 30      # 止盈30%
trailing_stop_pct: 18    # 移动止损18%
max_hold_days: 180       # 最长持仓180天

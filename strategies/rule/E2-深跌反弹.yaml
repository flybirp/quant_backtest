# 策略：深跌反弹
# 来源：discover_绝地逢生.md - 核心发现
#
# 核心逻辑（简化版）：
# 1. 深跌（前10天跌>15%）- 恐慌出清
# 2. 知行多头排列 - 趋势确认
# 3. 非派发阶段 - 卖压衰竭
# 4. 低估值保护（PE<35）- 向下空间有限
#
# 统计依据：
# - 大跌20%+缩量击败：79.9%成功率
# - 知行金叉后回踩：93.7%回升率

name: E2-深跌反弹
_pool: 大蓝筹
backtest_mode: signal
buy_execution: next_day
buy_price_type: open
sell_execution: next_day
sell_price_type: avg
k_type: daily

# 入场条件：深跌后趋势确认
buy_groups:
  - name: 深跌反弹
    conditions:
      # 深跌（前10天跌>15%）- 恐慌出清
      - indicator: pct_change_lt
        params: {pct: -15, lookback: 10}
      # 知行多头排列 - 趋势确认
      - indicator: zhixing_fast_above_slow
      # 非派发阶段 - 卖压衰竭
      - indicator: not_distribution
      # 低估值保护（PE<35）- 向下空间有限
      - indicator: pe_ttm_below
        params: {threshold: 35}

# 出场条件
sell_groups:
  - name: 趋势反转
    conditions:
      # 知行死叉离场
      - indicator: zhixing_dead_cross

# 风控参数（稳健版，止损≤15%）
stop_loss_pct: 12        # 止损12%（散户心理承受内）
take_profit_pct: 30      # 止盈30%
trailing_stop_pct: 18    # 移动止损18%
max_hold_days: 180       # 最长持仓180天

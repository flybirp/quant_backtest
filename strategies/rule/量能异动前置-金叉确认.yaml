name: "量能异动前置-金叉确认"
k_type: daily
backtest_mode: signal
initial_capital: 100000

# 逻辑链：低位量能异动 → 关注 → 金叉确认 → 买入
buy_groups:
  # 信号1: 低位 + 强量能异动 + 金叉前夕/刚金叉
  - conditions:
      - indicator: low_position
        params: {price_pct: 40, ma60_dist: 5}
      - indicator: volume_anomaly_strong
      - indicator: not_distribution
      - indicator: zhixing_fast_above_slow

  # 信号2: 低位 + 温和放量 + 金叉买入 + 缩量
  - conditions:
      - indicator: low_position
        params: {price_pct: 30, ma60_dist: 3}
      - indicator: volume_anomaly
        params: {ratio: 1.5}
      - indicator: not_distribution
      - indicator: zhixing_golden_cross

sell_groups:
  # 死叉卖出
  - conditions:
      - indicator: zhixing_dead_cross

position_pct: 0.25
max_positions: 4
stop_loss_pct: 5.0
take_profit_pct: 25.0
trailing_stop_pct: 10.0

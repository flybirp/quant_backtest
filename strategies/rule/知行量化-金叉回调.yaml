name: "知行量化-金叉回调"
k_type: daily
backtest_mode: signal
buy_price_type: open
sell_price_type: avg
buy_execution: next_day
sell_execution: next_day

buy_groups:
  - conditions:
      - indicator: zhixing_golden_cross_hold
        params: {days: 3}
      - indicator: price_near_zhixing
        params: {tolerance: 3}
      - indicator: volume_shrink
        params: {ratio: 0.6}

sell_groups:
  - conditions:
      - indicator: zhixing_dead_cross

add_groups:
  - conditions:
      - indicator: price_near_zhixing
        params: {tolerance: 3}
      - indicator: zhixing_fast_above_slow
      - indicator: volume_anomaly
        params: {ratio: 1.3}

reduce_groups:
  - conditions:
      - indicator: rsi_overbought
        params: {period: 14, threshold: 75}

reduce_pct: 0.5
position_pct: 0.33
max_positions: 3
stop_loss_pct: 5.0
take_profit_pct: 25.0
trailing_stop_pct: 10.0

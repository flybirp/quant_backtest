# V1-吸筹确认-激进 + 分批建仓/止盈
# 论文最优: 正金字塔 50-30-20 分批建仓 + 分批止盈 50%@+5% / 25%@+10% / 剩余trailing
add_groups: []
backtest_mode: signal
buy_execution: next_day
buy_groups:
- conditions:
  - indicator: volume_anomaly
    params:
      ratio: 1.3
  - indicator: low_position
    params:
      ma60_dist: 10
      price_pct: 40
  - indicator: zhixing_golden_cross_hold
    params:
      days: 2
  - indicator: not_distribution
buy_price_type: open
k_type: daily
max_hold_days: 30
name: V1-吸筹确认-激进-分批
reduce_groups: []
sell_execution: next_day
sell_groups:
- conditions:
  - indicator: zhixing_dead_cross
sell_price_type: avg
stock_pool: []  # 由标的池覆盖
stop_loss_pct: 5
take_profit_pct: 0  # 禁用固定止盈，由exit_ladder和trailing_stop管理
trailing_stop_pct: 8

# 分批建仓: 50%首笔 → +3%加30% → +6%加20%
entry_ladder:
  - trigger_pct: 0
    weight: 50
  - trigger_pct: 3
    weight: 30
  - trigger_pct: 6
    weight: 20

# 分批止盈: +5%出50% → +10%出25% → 剩余25%由trailing_stop管理
exit_ladder:
  - profit_pct: 5
    close_pct: 50
  - profit_pct: 10
    close_pct: 50

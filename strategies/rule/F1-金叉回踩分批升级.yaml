# 策略：金叉回踩分批升级
# 基于F1的升级版，分批建仓逻辑
#
# 买入逻辑：
# 1. 回踩信号触发 → 买入 2/3 仓位（67%）
# 2. 价格继续下跌 2% → 再买 1/3 仓位（33%）
# 3. 如果第一次买入就是最低点，只用 2/3 仓位
#
# 卖出逻辑（分批止盈）：
# 1. 第一卖点：回到持仓最高价（前高点）→ 卖50%
# 2. 第二卖点：从最高价再涨20% → 卖剩余50%
# 3. 止损：跌破买点5% → 清仓
#
# 与F1的区别：
# - F1: 一次性买入100%仓位
# - F1升级: 先买67%，下跌2%再买33%

name: F1-金叉回踩分批升级
_pool: 大蓝筹
backtest_mode: signal
buy_execution: next_day
buy_price_type: open
sell_execution: next_day
sell_price_type: avg
k_type: daily

# 入场条件：金叉后回踩zhixing_slow
buy_groups:
  - name: 金叉回踩
    conditions:
      # 知行多头排列（金叉后状态）
      - indicator: zhixing_fast_above_slow
      # 价格回踩到zhixing_slow附近（5%以内）
      - indicator: price_near_zhixing
        params: {threshold: 5}
      # 缩量回踩（卖压衰竭）
      - indicator: volume_shrink
        params: {ratio: 0.8}
      # 非派发阶段
      - indicator: not_distribution
      # 相对强度（避免弱势股）
      - indicator: relative_strength
        params: {lookback: 20, threshold: 0}

# 出场条件
sell_groups:
  - name: 趋势反转
    conditions:
      # 知行死叉离场
      - indicator: zhixing_dead_cross

# 分批建仓（Entry Ladder）
# 首次买入：67%仓位
# 下跌2%时：再买33%仓位
entry_ladder:
  - trigger_pct: 0      # 首次买入触发
    weight: 67           # 2/3 仓位
  - trigger_pct: -2      # 下跌2%时触发
    weight: 33           # 1/3 仓位

# 分批止盈（Exit Ladder）- 动态前高版
exit_ladder:
  - use_highest: true        # 回到持仓最高价时触发
    close_pct: 50            # 卖出50%
  - from_highest_pct: 20     # 从最高价再涨20%时触发
    close_pct: 100           # 卖出剩余全部

# 风控参数
stop_loss_pct: 5         # 止损5%
take_profit_pct: 0       # 不使用固定止盈
trailing_stop_pct: 0     # 不使用移动止损
max_hold_days: 180       # 最长持仓180天

_pool: 大蓝筹
add_groups:
- conditions:
  - indicator: sign_of_strength
    params:
      breakout_period: 20
      min_pct: 2.0
      vol_ratio: 1.5
- conditions:
  - indicator: last_point_support
    params:
      higher_low: true
      pullback_to: ma20
      tolerance: 3
      vol_shrink: 0.6
backtest_mode: signal
buy_execution: next_day
buy_groups:
- conditions:
  - indicator: effort_result_diverge
    params:
      days: 6
      type: bull_div
      vol_ratio: 1.3
      vol_shrink: 0.7
  - indicator: low_position
    params:
      ma60_dist: 8
      price_pct: 45
  - indicator: not_distribution
- conditions:
  - indicator: stopping_volume
    params:
      max_spread: 2.5
      vol_ratio: 1.5
  - indicator: no_supply
    params:
      max_drop: -0.5
      vol_shrink: 0.5
- conditions:
  - indicator: secondary_test
    params:
      period: 20
      test_type: support
      vol_shrink: 0.5
  - indicator: no_supply
    params:
      max_drop: -0.3
      vol_shrink: 0.4
buy_price_type: open
k_type: daily
max_hold_days: 15
name: 威科夫量价法则
reduce_groups:
- conditions:
  - indicator: no_demand
    params:
      max_rise: 1.5
      min_rise: 0.0
      vol_shrink: 0.5
- conditions:
  - indicator: sign_of_weakness
    params:
      min_drop: -2.0
      support_period: 20
      vol_ratio: 1.3
reduce_pct: 0.5
sell_execution: next_day
sell_groups:
- conditions:
  - indicator: effort_result_diverge
    params:
      days: 6
      type: bear_div
      vol_ratio: 1.3
      vol_shrink: 0.7
  - indicator: buying_climax
    params:
      high_position: 65
      min_rise: 3.0
      vol_ratio: 1.8
      wick_ratio: 0.3
- conditions:
  - indicator: no_demand
    params:
      max_rise: 2.0
      min_rise: 0.0
      vol_shrink: 0.5
  - indicator: upthrust_distribution
    params:
      high_position: 60
      resist_period: 20
      vol_confirm: false
sell_price_type: avg
stop_loss_pct: 3.0
take_profit_pct: 20.0
trailing_stop_pct: 8.0

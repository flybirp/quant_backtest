_pool: 大蓝筹
add_groups:
- conditions:
  - indicator: price_below_zhixing_fast
  - indicator: double_bottom
    params:
      lookback: 60
      tolerance: 3.0
  name: 跌破fast后双底
add_pct: 0
add_threshold: 0
backtest_mode: signal
buy_execution: next_day
buy_groups:
- conditions:
  - indicator: zhixing_long_downtrend
    params:
      days: 100
  - indicator: recent_volume_explosion
    params:
      lookback: 15
      vol_rank_threshold: 95
      vol_ratio_threshold: 3.0
  - indicator: volume_sustained
    params:
      explosion_lookback: 15
      sustain_days: 3
      sustain_ratio: 0.7
      vol_rank_threshold: 95
      vol_ratio_threshold: 3.0
  - indicator: price_cross_above_zhixing_fast
  name: 量能爆发站上fast
buy_price_type: open
entry_ladder:
- trigger_pct: 0
  weight: 50
k_type: daily
max_hold_days: 60
name: 量能爆发底部反转-TOP1
reduce_groups:
- conditions:
  - indicator: price_below_bbi_consecutive
    params:
      days: 2
  name: 连续低于BBI减仓
sell_execution: next_day
sell_groups:
- conditions:
  - indicator: double_bottom_broken
    params:
      break_pct: 3.0
      lookback: 60
      tolerance: 3.0
  name: 双底破坏清仓
- conditions:
  - indicator: price_below_zhixing_slow_consecutive
    params:
      days: 2
      recent_above_days: 10
  name: 连续低于slow清仓
sell_price_type: avg
stop_loss_pct: 8
take_profit_pct: 0
trailing_stop_pct: 0

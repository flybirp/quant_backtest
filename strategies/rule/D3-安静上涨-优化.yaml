# 策略：安静上涨（优化版）
# 优化点：
# 1. 放宽止损：8% → 15%
# 2. 延长持仓：250天 → 365天
# 3. 提高止盈：80% → 100%
# 4. 增加移动止损幅度：15% → 25%

name: D3-安静上涨-优化
_pool: 大蓝筹
backtest_mode: signal
buy_execution: next_day
buy_price_type: open
sell_execution: next_day
sell_price_type: avg
k_type: daily

# 入场条件：沿知行线平稳上行，波动率低
buy_groups:
  - name: 安静上涨
    conditions:
      # 知行多头排列
      - indicator: zhixing_fast_above_slow
      # 价格在知行线附近（不远离，说明平稳）
      - indicator: price_near_zhixing
        params: {threshold: 10}
      # 连续上涨（趋势确认）
      - indicator: consecutive_up
        params: {days: 3}
      # 非派发阶段
      - indicator: not_distribution
      # 市值>200亿（大蓝筹更稳定）
      - indicator: total_mv_above
        params: {threshold: 200}

# 出场条件
sell_groups:
  - name: 趋势反转
    conditions:
      # 知行死叉离场
      - indicator: zhixing_dead_cross

# 风控参数（优化后）
stop_loss_pct: 15        # 放宽止损：8% → 15%
take_profit_pct: 100     # 提高止盈：80% → 100%
trailing_stop_pct: 25    # 增加移动止损：15% → 25%
max_hold_days: 365       # 延长持仓：250天 → 365天

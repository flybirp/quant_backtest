backtest_mode: signal
buy_execution: next_day
buy_groups:
- conditions:
  - indicator: market_crash_recent
  - indicator: relative_strength
    params:
      lookback: 60
      threshold: 12
  - indicator: volume_anomaly
    params:
      ratio: 2.2
  - indicator: not_distribution
  - indicator: pe_ttm_below
    params:
      threshold: 30
  - indicator: total_mv_above
    params:
      threshold: 300
  - indicator: pb_below
    params:
      threshold: 2.0
  - indicator: pe_pct_low
    params:
      lookback: 252
      threshold: 30

buy_price_type: open
k_type: daily
max_hold_days: 250
name: 恐慌错杀-狙击_r11
reduce_groups:
- conditions:
  - indicator: rsi_overbought
    params:
      period: 14
      threshold: 70
  - indicator: volume_anomaly
    params:
      ratio: 1.3
  name: 分批止盈
reduce_pct: 0.5

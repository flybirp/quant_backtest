_pool: 大蓝筹
add_groups:
- conditions:
  - indicator: sign_of_strength
    params:
      breakout_period: 20
      min_pct: 2.0
      vol_ratio: 1.5
      wide_spread: true
- conditions:
  - indicator: last_point_support
    params:
      higher_low: true
      pullback_to: ma20
      tolerance: 3
      vol_shrink: 0.6
backtest_mode: signal
buy_execution: next_day
buy_groups:
- conditions:
  - indicator: selling_climax
    params:
      min_drop: -4.0
      vol_ratio: 2.0
      wick_ratio: 0.3
  - indicator: spring_shakeout
    params:
      spring_type: 3
      support_period: 20
      support_type: low
      vol_confirm: true
- conditions:
  - indicator: secondary_test
    params:
      period: 20
      test_type: support
      vol_shrink: 0.5
  - indicator: spring_shakeout
    params:
      support_period: 20
      support_type: low
      vol_confirm: false
- conditions:
  - indicator: no_supply
    params:
      max_drop: -0.5
      vol_shrink: 0.4
  - indicator: low_position
    params:
      ma60_dist: 8
      price_pct: 40
buy_price_type: open
k_type: daily
max_hold_days: 15
name: 威科夫吸筹-弹簧效应
reduce_groups:
- conditions:
  - indicator: sign_of_weakness
    params:
      min_drop: -2.0
      support_period: 20
      vol_ratio: 1.3
- conditions:
  - indicator: no_demand
    params:
      max_rise: 2.0
      min_rise: 0.0
      vol_shrink: 0.5
reduce_pct: 0.5
sell_execution: next_day
sell_groups:
- conditions:
  - indicator: upthrust_distribution
    params:
      high_position: 70
      resist_period: 20
      vol_confirm: true
- conditions:
  - indicator: buying_climax
    params:
      high_position: 75
      min_rise: 5.0
      vol_ratio: 2.0
      wick_ratio: 0.4
sell_price_type: avg
stop_loss_pct: 3.0
take_profit_pct: 15.0
trailing_stop_pct: 5.0

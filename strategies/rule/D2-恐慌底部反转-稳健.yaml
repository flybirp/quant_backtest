# 策略：恐慌底部反转（稳健版）
# 设计思路：止损控制在20%以内，适合散户心态
# 优化点：
# 1. 止损：18% → 15%（散户心理承受上限）
# 2. 移动止损：30% → 20%（更早锁定利润）
# 3. 止盈：80% → 40%（更快止盈）
# 4. 持仓：300天 → 180天（避免长期套牢）

name: D2-恐慌底部反转-稳健
_pool: 大蓝筹
backtest_mode: signal
buy_execution: next_day
buy_price_type: open
sell_execution: next_day
sell_price_type: avg
k_type: daily

# 入场条件：市场恐慌 + 个股低位缩量企稳
buy_groups:
  - name: 恐慌底部反转
    conditions:
      # 中证1000近期暴跌（20天跌>10%）
      - indicator: zz1000_crash
        params: {lookback: 20, threshold: -10}
      # 个股处于低位
      - indicator: low_position
        params: {ma60_dist: 20, price_pct: 30}
      # 缩量（量比<0.7，表示卖压衰竭）
      - indicator: volume_shrink
        params: {ratio: 0.7}
      # 非派发阶段
      - indicator: not_distribution
      # PE合理（避免高估值风险）
      - indicator: pe_ttm_below
        params: {threshold: 40}
      # 市值>100亿（避免小盘股波动过大）
      - indicator: total_mv_above
        params: {threshold: 100}

# 出场条件
sell_groups:
  - name: 趋势反转
    conditions:
      # 知行死叉离场
      - indicator: zhixing_dead_cross

# 风控参数（稳健版，止损≤20%）
stop_loss_pct: 15        # 止损15%（散户心理承受内）
take_profit_pct: 40      # 止盈40%（更快锁定）
trailing_stop_pct: 20    # 移动止损20%（更早锁定）
max_hold_days: 180       # 最长持仓180天

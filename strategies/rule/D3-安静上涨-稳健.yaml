# 策略：安静上涨（稳健版）
# 设计思路：止损控制在20%以内，适合散户心态
# 优化点：
# 1. 止损：15% → 12%（散户心理承受上限）
# 2. 移动止损：25% → 18%（更早锁定利润）
# 3. 止盈：100% → 30%（更快止盈）
# 4. 持仓：365天 → 180天（避免长期套牢）

name: D3-安静上涨-稳健
_pool: 大蓝筹
backtest_mode: signal
buy_execution: next_day
buy_price_type: open
sell_execution: next_day
sell_price_type: avg
k_type: daily

# 入场条件：沿知行线平稳上行，波动率低
buy_groups:
  - name: 安静上涨
    conditions:
      # 知行多头排列
      - indicator: zhixing_fast_above_slow
      # 价格在知行线附近（不远离，说明平稳）
      - indicator: price_near_zhixing
        params: {threshold: 10}
      # 连续上涨（趋势确认）
      - indicator: consecutive_up
        params: {days: 3}
      # 非派发阶段
      - indicator: not_distribution
      # 市值>200亿（大蓝筹更稳定）
      - indicator: total_mv_above
        params: {threshold: 200}

# 出场条件
sell_groups:
  - name: 趋势反转
    conditions:
      # 知行死叉离场
      - indicator: zhixing_dead_cross

# 风控参数（稳健版，止损≤20%）
stop_loss_pct: 12        # 止损12%（散户心理承受内）
take_profit_pct: 30      # 止盈30%（更快锁定）
trailing_stop_pct: 18    # 移动止损18%（更早锁定）
max_hold_days: 180       # 最长持仓180天

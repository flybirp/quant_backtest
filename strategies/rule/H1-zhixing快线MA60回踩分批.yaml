# 策略：zhixing快线MA60回踩分批
# 基于zhixing_fast/MA60金叉后的回踩买点
#
# 混合指标：
# - 快线：zhixing_fast（双重平滑10日EMA）
# - 慢线：MA60（60日均线）
#
# 买点逻辑：
# 1. zhixing_fast > MA60（多头排列）
# 2. 价格在MA60上方（回踩但未跌破）
# 3. 缩量回踩（量比<0.8）- 卖压衰竭
# 4. 非派发阶段
# 5. 相对强度为正
#
# 卖点逻辑（分批止盈）：
# 1. 第一卖点：回到持仓最高价（前高点）→ 卖50%
# 2. 第二卖点：从最高价再涨20% → 卖剩余50%
# 3. 止损：跌破买点5% → 清仓

name: H1-zhixing快线MA60回踩分批
_pool: 大蓝筹
backtest_mode: signal
buy_execution: next_day
buy_price_type: open
sell_execution: next_day
sell_price_type: avg
k_type: daily

# 入场条件：zhixing_fast > MA60 回踩
buy_groups:
  - name: zhixing快线MA60回踩
    conditions:
      # zhixing_fast > MA60（多头排列）
      - indicator: zhixing_fast_above_ma
        params: {period: 60}
      # 价格在MA60上方（回踩但未跌破）
      - indicator: price_above_ma
        params: {period: 60}
      # 缩量回踩（卖压衰竭）
      - indicator: volume_shrink
        params: {ratio: 0.8}
      # 非派发阶段
      - indicator: not_distribution
      # 相对强度（避免弱势股）
      - indicator: relative_strength
        params: {lookback: 20, threshold: 0}

# 出场条件
sell_groups:
  - name: 趋势反转
    conditions:
      # zhixing_fast 下穿 MA60 离场
      - indicator: zhixing_fast_below_ma
        params: {period: 60}

# 分批止盈（Exit Ladder）- 动态前高版
exit_ladder:
  - use_highest: true        # 回到持仓最高价时触发
    close_pct: 50            # 卖出50%
  - from_highest_pct: 20     # 从最高价再涨20%时触发
    close_pct: 100           # 卖出剩余全部

# 风控参数
stop_loss_pct: 5         # 止损5%
take_profit_pct: 0       # 不使用固定止盈
trailing_stop_pct: 0     # 不使用移动止损
max_hold_days: 180       # 最长持仓180天

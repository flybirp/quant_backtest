name: "小池测试策略"
k_type: daily
backtest_mode: signal
initial_capital: 100000

buy_groups:
  - conditions:
      - indicator: ma_cross_up
        params: {fast: 5, slow: 20}

sell_groups:
  - conditions:
      - indicator: ma_cross_down
        params: {fast: 5, slow: 10}

position_pct: 0.25
max_positions: 5
stop_loss_pct: 5.0
take_profit_pct: 15.0

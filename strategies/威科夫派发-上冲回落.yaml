# 威科夫派发-上冲回落策略
# 严格买点: 低位Spring弹簧 + 放量确认
# 核心卖点: UTAD上冲回落(假突破) + SOW弱势信号
# 减仓: LPSY最后供给点 + 量价空头背离
name: "威科夫派发-上冲回落"
k_type: daily
backtest_mode: signal
buy_price_type: open
sell_price_type: avg
buy_execution: next_day
sell_execution: next_day

buy_groups:
  # 低位Spring弹簧 + 放量确认（严格条件）
  - conditions:
      - indicator: spring_shakeout
        params: {support_period: 30, support_type: low, vol_confirm: true}
      - indicator: low_position
        params: {price_pct: 40, ma60_dist: 5}

sell_groups:
  # UTAD上冲回落(放量假突破=主力出货)
  - conditions:
      - indicator: upthrust_distribution
        params: {resist_period: 20, high_position: 70, vol_confirm: true}

  # SOW弱势信号(放量跌破支撑)
  - conditions:
      - indicator: sign_of_weakness
        params: {support_period: 20, vol_ratio: 1.5, min_drop: -3.0}

reduce_groups:
  # 高位量价背离(买盘衰竭)减仓
  - conditions:
      - indicator: effort_result_diverge
        params: {type: bear_div, days: 6, vol_ratio: 1.3, vol_shrink: 0.7}

  # LPSY最后供给点(缩量反弹至阻力)
  - conditions:
      - indicator: last_point_supply
        params: {rally_to: ma20, vol_shrink: 0.7, low_position: 40, tolerance: 3}

add_groups:
  # SOS确认加仓
  - conditions:
      - indicator: sign_of_strength
        params: {breakout_period: 20, vol_ratio: 1.5, min_pct: 2.0}

reduce_pct: 0.5
stop_loss_pct: 5.0
take_profit_pct: 20.0
trailing_stop_pct: 8.0

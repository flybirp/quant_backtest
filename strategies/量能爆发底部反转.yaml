# 量能爆发底部反转策略
# 前置条件: zhixing_fast长期 < zhixing_slow + 天量爆发 + 量能持续 + 站上zhixing_fast
# 买点1: 站上zhixing_fast次日买入半仓
# 买点2: 跌破zhixing_fast后形成双底，加半仓
# 止损1: 双底破坏清仓
# 止盈1: 连续2日低于BBI，减半仓
# 止盈2: 连续2日低于zhixing_slow，清仓
#
# 网格搜索最优参数 (2026-06-23 三轮搜索):
# 粗36+细27+深层33=96组, 全局TOP1: EV=+6.07%, 胜率=44.3%, 盈亏比=6.05
# 最优: dt=100 vr=95 vratio=3.0 sd=3 sr=0.7 dbl=60 dbt=3.0 bp=3.0 ra=10 el=15
# 注意: 持仓数=210(2.5年), dt=40时EV=2.76%/持仓=794, 信号质量vs数量权衡

name: "量能爆发底部反转"
k_type: daily
backtest_mode: signal
buy_price_type: open
sell_price_type: avg
buy_execution: next_day
sell_execution: next_day

# 风控
stop_loss_pct: 8         # 固定止损8%（安全网）
take_profit_pct: 0       # 禁用固定止盈，用分批止盈替代
trailing_stop_pct: 0     # 禁用移动止损
max_hold_days: 60        # 最长持仓60天

# 仓位管理
entry_ladder:
  - trigger_pct: 0
    weight: 50           # 买点1: 半仓
add_threshold: 0         # 不使用传统加仓
add_pct: 0

# 买点1: 站上zhixing_fast（前提：长期下跌+量能爆发+量能持续）
buy_groups:
  - name: "量能爆发站上fast"
    conditions:
      - indicator: zhixing_long_downtrend
        params:
          days: 100          # [深层最优] 连续100天fast<slow（超长期下跌确认）
      - indicator: recent_volume_explosion
        params:
          lookback: 15       # 近15天内出现天量
          vol_rank_threshold: 95   # [深层最优] vol_rank >= 95
          vol_ratio_threshold: 3.0  # [深层最优] 或量 >= 3x均量
      - indicator: volume_sustained
        params:
          sustain_days: 3    # [深层最优] 量能持续3天
          sustain_ratio: 0.7 # [深层最优] 维持70%均量
          explosion_lookback: 15
          vol_rank_threshold: 95
          vol_ratio_threshold: 3.0
      - indicator: price_cross_above_zhixing_fast

# 买点2: 跌破fast后双底加仓
add_groups:
  - name: "跌破fast后双底"
    conditions:
      - indicator: price_below_zhixing_fast
      - indicator: double_bottom
        params:
          lookback: 60       # [深层最优] 双底回望60天
          tolerance: 3.0     # [深层最优] 两底容差3%

# 止损1: 双底形态破坏
sell_groups:
  - name: "双底破坏清仓"
    conditions:
      - indicator: double_bottom_broken
        params:
          lookback: 60       # [深层最优]
          tolerance: 3.0     # [深层最优]
          break_pct: 3.0     # [深层最优] 跌破支撑3%确认
  - name: "连续低于slow清仓"
    conditions:
      - indicator: price_below_zhixing_slow_consecutive
        params:
          days: 2
          recent_above_days: 10   # [深层最优] 近10天内曾高于slow才触发

# 止盈1: 连续2日低于BBI，减半仓
reduce_groups:
  - name: "连续低于BBI减仓"
    conditions:
      - indicator: price_below_bbi_consecutive
        params:
          days: 2

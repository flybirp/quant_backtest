# 威科夫量价法则策略 v2 (网格搜索最优参数)
# 核心: 努力vs结果背离 + 供需关系 + Stopping Volume + No Supply
# 买入: Stopping Volume+No Supply / ST确认+No Supply / 量价多头背离+低位
# 卖出: 量价空头背离+BC / No Demand+UTAD
# 网格搜索最优: stop=3%, tp=20%, trail=8%, 盈亏比3.18
name: "威科夫量价法则"
k_type: daily
backtest_mode: signal
buy_price_type: open
sell_price_type: avg
buy_execution: next_day
sell_execution: next_day

buy_groups:
  # 组1: 多头量价背离(放量大跌→缩量企稳=卖盘衰竭) + 低位 + 非出货
  - conditions:
      - indicator: effort_result_diverge
        params: {type: bull_div, days: 6, vol_ratio: 1.3, vol_shrink: 0.7}
      - indicator: low_position
        params: {price_pct: 45, ma60_dist: 8}
      - indicator: not_distribution

  # 组2: Stopping Volume(供应被吸收) + No Supply(供应枯竭)
  - conditions:
      - indicator: stopping_volume
        params: {vol_ratio: 1.5, max_spread: 2.5}
      - indicator: no_supply
        params: {vol_shrink: 0.5, max_drop: -0.5}

  # 组3: ST二次测试(确认支撑) + No Supply(供应完全枯竭)
  - conditions:
      - indicator: secondary_test
        params: {test_type: support, period: 20, vol_shrink: 0.5}
      - indicator: no_supply
        params: {vol_shrink: 0.4, max_drop: -0.3}

sell_groups:
  # 空头量价背离(放量大涨→缩量停滞=买盘衰竭) + BC抢购高潮
  - conditions:
      - indicator: effort_result_diverge
        params: {type: bear_div, days: 6, vol_ratio: 1.3, vol_shrink: 0.7}
      - indicator: buying_climax
        params: {vol_ratio: 1.8, min_rise: 3.0, wick_ratio: 0.3, high_position: 65}

  # No Demand(上涨乏力) + UTAD(假突破)
  - conditions:
      - indicator: no_demand
        params: {vol_shrink: 0.5, min_rise: 0.0, max_rise: 2.0}
      - indicator: upthrust_distribution
        params: {resist_period: 20, high_position: 60, vol_confirm: false}

add_groups:
  # SOS强势加仓
  - conditions:
      - indicator: sign_of_strength
        params: {breakout_period: 20, vol_ratio: 1.5, min_pct: 2.0}

  # LPS缩量回踩(更高低点)加仓
  - conditions:
      - indicator: last_point_support
        params: {pullback_to: ma20, vol_shrink: 0.6, tolerance: 3, higher_low: true}

reduce_groups:
  # No Demand(上涨乏力)减仓
  - conditions:
      - indicator: no_demand
        params: {vol_shrink: 0.5, min_rise: 0.0, max_rise: 1.5}

  # SOW弱势信号减仓
  - conditions:
      - indicator: sign_of_weakness
        params: {support_period: 20, vol_ratio: 1.3, min_drop: -2.0}

reduce_pct: 0.5
stop_loss_pct: 3.0
take_profit_pct: 20.0
trailing_stop_pct: 8.0
max_hold_days: 15

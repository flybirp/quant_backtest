# 量能爆发底部反转策略 - zzh0.2
# 基于 zzh0.1，修复4个逻辑矛盾:
# 1. 加仓数量=50（与建仓等量，不再是100）
# 2. 减仓按总仓位比例计算（不再只减最后一个lot）
# 3. 双底破坏清仓仅在加仓触发后启用，跌破容错从3%提高到5%
# 4. 减仓改为一次性触发（首次连续2天低于BBI减总仓位50%，之后不再触发）

name: "zzh0.2"
k_type: daily
backtest_mode: signal
buy_price_type: open
sell_price_type: avg
buy_execution: next_day
sell_execution: next_day

stop_loss_pct: 8
take_profit_pct: 0
trailing_stop_pct: 0
max_hold_days: 60

entry_ladder:
  - trigger_pct: 0
    weight: 50
add_threshold: 0
add_pct: 0

buy_groups:
  - name: "量能爆发站上fast"
    conditions:
      - indicator: zhixing_long_downtrend
        params:
          days: 100
      - indicator: recent_volume_explosion
        params:
          lookback: 20
          vol_rank_threshold: 95
          vol_ratio_threshold: 3.0
      - indicator: volume_sustained
        params:
          sustain_days: 3
          sustain_ratio: 0.7
          explosion_lookback: 20
          vol_rank_threshold: 95
          vol_ratio_threshold: 3.0
      - indicator: price_cross_above_zhixing_fast

add_groups:
  - name: "跌破fast后双底"
    conditions:
      - indicator: price_below_zhixing_fast
      - indicator: double_bottom
        params:
          lookback: 60
          tolerance: 3.0

sell_groups:
  - name: "双底破坏清仓"
    conditions:
      - indicator: double_bottom_broken
        params:
          lookback: 60
          tolerance: 3.0
          break_pct: 5.0
  - name: "连续低于slow清仓"
    conditions:
      - indicator: price_below_zhixing_slow_consecutive
        params:
          days: 2
          recent_above_days: 10

reduce_groups:
  - name: "连续低于BBI减仓"
    conditions:
      - indicator: price_below_bbi_consecutive
        params:
          days: 2
